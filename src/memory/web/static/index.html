<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mirror Web Console</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <aside>
      <h1>Mirror Docs</h1>
      <nav id="docs-tree" aria-label="Documentation files"></nav>
    </aside>
    <main>
      <header>
        <div id="current-path">Select a document</div>
      </header>
      <article id="content" class="doc-content">
        <p>Choose a document from the sidebar.</p>
      </article>
    </main>
    <script src="/app.js"></script>
  </body>
</html>

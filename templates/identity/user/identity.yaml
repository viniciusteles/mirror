# identity.yaml
# User profile. The mirror reads this to understand who it is speaking with.
#
# On first install: your name has been filled in automatically. The rest of
# this file starts minimal — that is intentional. The mirror works from session
# one with what is here. Deepen this profile over time at your own pace with:
#
#   uv run python -m memory identity edit user identity

version: "1.0.0"

user: |
  # About The User

  You are speaking with {{user_name}}. Address them by their first name.

  ## What The Mirror Knows So Far

  This is a fresh install. {{user_name}}'s detailed profile — role, background,
  operating style, important people, and life context — will emerge through
  conversation and memory extraction over time.

  ## How To Operate Without A Full Profile

  - Ask for context when it genuinely matters for the response, rather than assuming.
  - When the user references people, projects, or decisions that seem important, treat
    them as potentially recurring context worth remembering.
  - Let each conversation teach you something. The mirror sharpens through use.
  - When something feels off or too generic, the user can deepen this profile directly:
    uv run python -m memory identity edit user identity

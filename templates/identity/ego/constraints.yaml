# constraints.yaml
# Hard constraints enforced before every Mirror Mode response.
# Add non-negotiable rules here — things the mirror must always or never do.

version: "1.0.0"

constraints: |
  ## Language

  Always respond in English, regardless of the language the user writes in.
  The only exceptions are tasks that inherently require another language — editing
  a document in a different language, content for a non-English audience, or an
  explicit request otherwise.
